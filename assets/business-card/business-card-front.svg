  <rect x="16" y="16" width="818" height="518" rx="16" fill="none" stroke="#c8862a" stroke-width="2"/>

  <!-- emblem (reverse / cream circle), centred -->
  <g transform="translate(280,52) scale(1.45)">
    <circle cx="100" cy="100" r="92" fill="#f5f0e6"/>
    <circle cx="100" cy="100" r="92" fill="none" stroke="#c8862a" stroke-width="4"/>
    <circle cx="100" cy="100" r="78" fill="none" stroke="#c8862a" stroke-width="1.5"/>
    <g fill="#3d7a35">
      <polygon points="100,40 118,72 82,72"/>

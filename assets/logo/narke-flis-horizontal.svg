<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 170" width="540" height="170" role="img" aria-label="Närke Flis AB — Flisning på plats">
  <!-- Horizontal lockup: icon + wordmark. Good for business-card top row, letterhead, email signature. -->
  <!-- icon (200-unit art scaled to 150px, centred vertically) -->
  <g transform="translate(12,10) scale(0.75)">
    <circle cx="100" cy="100" r="92" fill="#244d2a"/>
    <circle cx="100" cy="100" r="92" fill="none" stroke="#c8862a" stroke-width="4"/>
    <circle cx="100" cy="100" r="78" fill="none" stroke="#c8862a" stroke-width="1.5"/>
    <g fill="#7ab85f">
      <polygon points="100,46 122,84 78,84"/>
      <polygon points="100,66 128,110 72,110"/>
      <polygon points="100,86 134,132 66,132"/>
    </g>
    <rect x="93" y="130" width="14" height="20" fill="#8a5a22"/>
    <g fill="#c8862a">
      <polygon points="58,156 78,151 82,162 62,167"/>
      <polygon points="122,154 142,158 138,169 118,165"/>
      <polygon points="88,164 106,162 108,173 90,175"/>
    </g>
  </g>
  <!-- wordmark -->
  <text x="178" y="82" font-family="Helvetica, Arial, sans-serif" font-size="48" font-weight="800" fill="#244d2a" letter-spacing="0.5">NÄRKE FLIS</text>
  <text x="180" y="118" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="800" fill="#c8862a" letter-spacing="1">AB</text>
  <text x="214" y="118" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#6b6b6b" letter-spacing="0.5">· Flisning på plats</text>
</svg>
